name: Threads Post Manual

on:
  workflow_dispatch:
    inputs:
      english_paragraph:
        description: First paragraph for the Threads post (English)
        required: true
        type: string
      japanese_paragraph:
        description: Second paragraph for the Threads post (Japanese)
        required: true
        type: string

permissions:
  contents: read

jobs:
  post-to-threads:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Post manual Threads update
        env:
          THREADS_LONG_LIVED_TOKEN: ${{ secrets.THREADS_LONG_LIVED_TOKEN }}
          THREADS_TEST_ENGLISH: ${{ inputs.english_paragraph }}
          THREADS_TEST_JAPANESE: ${{ inputs.japanese_paragraph }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: python .github/scripts/post_threads_from_pr.py
